        Scheduled job that runs every 15 minutes (configured in vercel.json).
        Handles all onboarding email sequences:
        1. Detects first alert triggered (from alert_history → user_onboarding_state)
        2. Sends First Alert Triggered emails (1h delay)
        3. Starts re-engagement for newly inactive users
        4. Processes Re-Engagement Sequence (Stage 1-4: Day 3, 7, 14, 30)
        5. Sends Premium Upgrade nudge (for active free users)

        The Monitor service remains free of onboarding logic - it writes to alert_history,
        this cron reads from it.
      security:
        - CronSecret: []
      responses:
        '200':
          description: Cron job completed successfully
          content:
            application/json:
              schema:
                type: object
                required: [success, timestamp, duration_ms]
                properties:
                  success:
                    type: boolean
                    example: true
                  timestamp:
                    type: string
                    format: date-time
                    example: '2024-01-15T10:30:00.000Z'
                  duration_ms:
                    type: integer
                    example: 1234
                  first_triggered_detection:
                    type: object
                    properties:
                      detected:
                        type: integer
                        example: 5
                      errors:
                        type: array
                        items:
                          type: string
                  first_triggered_emails:
                    $ref: '#/components/schemas/EmailResult'
                  reengagement_start:
                    $ref: '#/components/schemas/EmailResult'
                  reengagement_sequence:
                    $ref: '#/components/schemas/EmailResult'
                  premium_upgrade:
                    $ref: '#/components/schemas/EmailResult'
        '401':
          description: Unauthorized - invalid or missing CRON_SECRET
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                required: [success, error, timestamp, duration_ms]
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Service error
                  timestamp:
                    type: string
                    format: date-time
                  duration_ms:
                    type: integer

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: First-party browser session cookie authentication (dashboard/web app).
    CronSecret:
      type: apiKey
      in: header
      name: Authorization
      description: Bearer token matching CRON_SECRET environment variable (set by Vercel for cron jobs)

  headers:
    X-RateLimit-Limit:
      description: Requests allowed in the current window
      schema: { type: integer }
    X-RateLimit-Remaining:
      description: Requests remaining in the current window
      schema: { type: integer }
    X-RateLimit-Reset:
      description: Reset time as Unix epoch milliseconds
      schema: { type: integer, format: int64 }
    X-StockAlert-Signature:
      description: HMAC SHA-256 signature for webhook deliveries in the format `sha256=<hex>` computed over `${timestamp}.${rawBody}`
      schema: { type: string, example: sha256=5e884898da28047151d0e56f8dc62927 }
    X-StockAlert-Event:
      description: Event type for the webhook delivery
      schema:
        type: string
        enum: [alert.triggered, alert.paused, alert.activated, alert.deleted, alert.created]
        example: alert.triggered
    X-StockAlert-Timestamp:
      description: Unix epoch milliseconds when the event was generated
      schema: { type: integer, format: int64, example: 1736180400000 }

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
      description: Page number (1-based)
    LimitAlertsList:
      name: limit
      in: query
      schema: { type: integer, default: 50, maximum: 100, minimum: 1 }
      description: Items per page (max 100)
    LimitHistory:
      name: limit
      in: query
      schema: { type: integer, default: 50, maximum: 200, minimum: 1 }
      description: History items per page (max 200)
    Status:
      name: status
      in: query
      schema: { $ref: '#/components/schemas/AlertStatus' }
    ConditionFilter:
      name: condition
      in: query
      schema: { $ref: '#/components/schemas/AlertCondition' }
    Search:
      name: search
      in: query
      schema: { type: string }
    SortField:
      name: sort_field
      in: query
      schema: { type: string, default: created_at }
    SortDirection:
      name: sort_direction
      in: query
      schema: { type: string, enum: [asc, desc], default: desc }
    Minimal:
      name: minimal
      in: query
      schema: { type: boolean }
      description: If true, reduces returned fields
    Extended:
      name: extended
      in: query
      schema: { type: boolean }
      description: If true, returns extended fields when available

  responses:
    Ok:
      description: Successful
      headers:
        X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
              data: { type: object }
              meta:
                type: object
                properties:
                  rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    Created:
      description: Created
      headers:
        X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
              data: { type: object }
              meta:
                type: object
                properties:
                  rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    Forbidden:
      description: Forbidden (missing scope)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    Validation:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    RateLimited:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    ServiceUnavailable:
      description: Upstream service unavailable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }

  schemas:
    # Cron
    EmailResult:
      type: object
      description: Result of an email batch operation
      properties:
        sent:
          type: integer
          description: Number of emails successfully sent
          example: 3
        processed:
          type: integer
          description: Number of users processed
          example: 5
        skipped:
          type: integer
          description: Number of users skipped (already processed or not eligible)
          example: 2
        errors:
          type: array
          items:
            type: string
          description: Error messages for failed operations

    # Auth
    AuthUserSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email, nullable: true }
    AuthLoginPasswordRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
    AuthLoginMagicLinkRequest:
      type: object
      required: [email, type]
      properties:
        email: { type: string, format: email }
        type:
          type: string
          enum: [magic_link]
    AuthRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        full_name: { type: string }
    AuthRefreshRequest:
      type: object
      properties:
        refresh_token: { type: string }
    AuthRequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        redirect_to: { type: string, description: Optional callback URL override for mobile deep links }
    AuthResetConfirmRequest:
      type: object
      required: [email, token, new_password]
      properties:
        email: { type: string, format: email }
        token: { type: string }
        new_password: { type: string, minLength: 6 }
    ApiSuccessAuthLoginEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          oneOf:
            - type: object
              properties:
                user: { $ref: '#/components/schemas/AuthUserSummary' }
              required: [user]
            - type: object
              properties:
                sent: { type: boolean, example: true }
              required: [sent]
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessAuthRegisterEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            user_created: { type: boolean }
            confirmation_sent: { type: boolean }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessAuthRefreshEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            refreshed: { type: boolean }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessAuthResetRequestedEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            sent: { type: boolean }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessAuthResetConfirmEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            reset: { type: boolean }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    WebhookEvent:
      type: object
      required: [id, event, timestamp, data]
      properties:
        id: { type: string, format: uuid, example: "77b9c1a8-5a7e-4f1c-9b8a-6b2d5c1e2f33" }
        event: { type: string, enum: [alert.triggered, alert.paused, alert.activated, alert.deleted, alert.created] }
        timestamp: { type: integer, format: int64, example: 1736180400000 }
        data:
          type: object
          properties:
            alert_id: { type: string, format: uuid }
            symbol: { type: string, example: AAPL }
            condition: { type: string, example: price_above }
            threshold: { type: number, nullable: true, example: 200 }
            notification: { type: string, enum: [email, sms] }
            status: { type: string, enum: [active, paused, triggered, inactive] }
            triggered_at: { type: string, format: date-time, nullable: true }
            price: { type: number, example: 201.34 }
    MetaPagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        total_pages: { type: integer }
    MetaRateLimit:
      type: object
      properties:
        limit: { type: integer, description: Requests allowed in the current window }
        remaining: { type: integer, description: Requests remaining in the current window }
        reset: { type: integer, format: int64, description: Reset time (epoch ms) }
    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, nullable: true }
    ApiErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { $ref: '#/components/schemas/ApiError' }

    # Stocks
    StockSummary:
      type: object
      properties:
        symbol: { type: string }
        name: { type: string, nullable: true }
        last_price: { type: number, nullable: true }
        previous_close: { type: number, nullable: true }
        ma_50: { type: number, nullable: true }
        ma_200: { type: number, nullable: true }
        rsi: { type: number, nullable: true }
        type: { type: string, nullable: true }
        is_active: { type: boolean }
    StockDetails:
      type: object
      properties:
        country: { type: string, nullable: true }
        sector: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        exchange: { type: string, nullable: true }
        isin: { type: string, nullable: true }
        alt_symbols: { type: object, nullable: true }
    Stock:
      allOf:
        - $ref: '#/components/schemas/StockSummary'
        - type: object
          properties:
            high_52w: { type: number, nullable: true }
            low_52w: { type: number, nullable: true }
            volume: { type: number, nullable: true }
            volume_ma_20: { type: number, nullable: true }
            volume_ma_100: { type: number, nullable: true }
            details: { $ref: '#/components/schemas/StockDetails' }
    StockSearchResult:
      type: object
      properties:
        symbol: { type: string }
        name: { type: string }
        exchange: { type: string }
        type: { type: string, nullable: true }
        last_price: { type: number, nullable: true }
    ApiSuccessStocksListEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items: { $ref: '#/components/schemas/StockSummary' }
        meta:
          type: object
          properties:
            pagination: { $ref: '#/components/schemas/MetaPagination' }
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessStocksSearchEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items: { $ref: '#/components/schemas/StockSearchResult' }
        meta:
          type: object
          properties:
                  rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessStockEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/Stock' }
        meta:
          type: object
          properties:
                  rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessStockWithFundamentalsEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          allOf:
            - $ref: '#/components/schemas/Stock'
            - type: object
              properties:
                fundamentals:
                  type: object
                  additionalProperties: true
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }

    # Watchlist
    WatchlistItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        stock_symbol: { type: string }
        intention: { type: string, enum: [buy, sell] }
        target_price: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        initial_price: { type: number, nullable: true }
        auto_alerts_enabled: { type: boolean }
    StockBrief:
      type: object
      properties:
        symbol: { type: string }
        name: { type: string }
        last_price: { type: number, nullable: true }
    WatchlistItemWithStock:
      allOf:
        - $ref: '#/components/schemas/WatchlistItem'
        - type: object
          properties:
            stocks:
              type: object
              allOf:
                - $ref: '#/components/schemas/StockBrief'
              nullable: true
            active_alert_count: { type: integer, nullable: true }
            paused_alert_count: { type: integer, nullable: true }
    CreateWatchlistItemRequest:
      type: object
      required: [stock_symbol, intention]
      properties:
        stock_symbol: { type: string }
        stock_name: { type: string }
        intention: { type: string, enum: [buy, sell] }
        target_price: { type: number }
        notes: { type: string }
    UpdateWatchlistItemRequest:
      type: object
      properties:
        target_price: { type: number, nullable: true }
        notes: { type: string, nullable: true }
        is_active: { type: boolean }
        auto_alerts_enabled: { type: boolean }
    SwapIntentionRequest:
      type: object
      required: [item_id, new_intention, stock_symbol]
      properties:
        item_id: { type: string }
        new_intention: { type: string, enum: [buy, sell] }
        stock_symbol: { type: string }
    ApiSuccessWatchlistListEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/WatchlistItemWithStock' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessWatchlistItemEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/WatchlistItemWithStock' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessWatchlistDeletedEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            deleted: { type: boolean }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessWatchlistOrderEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            item: { $ref: '#/components/schemas/WatchlistItemWithStock' }
            deleted_alerts: { type: integer }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    WatchlistPaperTrade:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        watchlist_id: { type: string, format: uuid }
        watchlist_item_id: { type: string, format: uuid }
        symbol: { type: string }
        direction: { type: string, enum: [long, short] }
        notional_usd: { type: number }
        quantity: { type: number }
        entry_price: { type: number }
        entry_at: { type: string, format: date-time }
        status: { type: string, enum: [open, closed] }
        exit_price: { type: number, nullable: true }
        exit_at: { type: string, format: date-time, nullable: true }
        realized_pnl_usd: { type: number, nullable: true }
    ApiSuccessWatchlistPaperTradesEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items: { $ref: '#/components/schemas/WatchlistPaperTrade' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }

    WatchlistPerformancePoint:
      type: object
      properties:
        date: { type: string, format: date }
        value: { type: number, description: Normalized index value (base 100 at first day) }
    WatchlistPerformancePayload:
      type: object
      properties:
        range:
          type: string
          enum: [3m,6m,1y,max]
        base_date:
          type: string
          format: date
          nullable: true
          description: First date in the series used as normalization base.
        series:
          type: object
          properties:
            watchlist:
              type: array
              items: { $ref: '#/components/schemas/WatchlistPerformancePoint' }
            sp_500:
              type: array
              items: { $ref: '#/components/schemas/WatchlistPerformancePoint' }
        summary:
          type: object
          properties:
            watchlist_return_pct:
              type: number
              description: Total percentage return of the simulated watchlist paper portfolio over the range.
            sp_500_return_pct:
              type: number
              description: Total percentage return of the S&P 500 benchmark over the range.
            alpha_pct:
              type: number
              description: Difference between watchlist_return_pct and sp500_return_pct.
    ApiSuccessWatchlistPerformanceEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/WatchlistPerformancePayload' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }

    # API Keys
    ApiKeySummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key_prefix: { type: string }
        rate_limit_tier: { type: string, enum: [basic, premium] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    ApiKeyCreated:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key_prefix: { type: string }
        created_at: { type: string, format: date-time }
        rate_limit_tier: { type: string, enum: [basic, premium] }
        api_key: { type: string, description: Plaintext API key (returned only on creation) }
    ApiSuccessApiKeysListEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items: { $ref: '#/components/schemas/ApiKeySummary' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
    ApiSuccessApiKeyEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/ApiKeyCreated' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }

    # Alerts
    AlertCondition:
      type: string
      enum: [
        price_above,
        price_below,
        price_change_up,
        price_change_down,
        new_high,
        new_low,
        reminder,
        daily_reminder,
        ma_crossover_golden,
        ma_crossover_death,
        ma_touch_above,
        ma_touch_below,
        volume_change,
        rsi_limit,
        pe_ratio_below,
        pe_ratio_above,
        forward_pe_below,
        forward_pe_above,
        earnings_announcement,
        dividend_ex_date,
        dividend_payment,
        insider_transactions
      ]
    AlertStatus:
      type: string
      enum: [active, paused, triggered, inactive]
    CreateAlertRequest:
      type: object
      required: [symbol, condition]
      properties:
        symbol: { type: string }
        condition: { $ref: '#/components/schemas/AlertCondition' }
        email: { type: string, format: email, description: Optional for guest creation }
        threshold: { type: number, nullable: true }
        notification: { type: string, enum: [email, sms], default: email }
        parameters:
          type: object
          additionalProperties: true
          description: |
            Optional metadata object. For mobile onboarding idempotency, include `onboarding_id` (string).
            For `daily_reminder` alerts, use `deliveryTime`: `market_open` (default) or `after_market_close`.
    Alert:
      type: object
      properties:
        id: { type: string, format: uuid }
        symbol: { type: string }
        condition: { $ref: '#/components/schemas/AlertCondition' }
        threshold: { type: number, nullable: true }
        notification: { type: string, enum: [email, sms] }
        status: { $ref: '#/components/schemas/AlertStatus' }
        created_at: { type: string, format: date-time }
        triggered_at: { type: string, format: date-time, nullable: true }
        initial_price: { type: number }
        parameters: { type: object, nullable: true, additionalProperties: true }
        stock:
          type: object
          nullable: true
          properties:
            name: { type: string }
            last_price: { type: number }
    UpdateAlertRequest:
      type: object
      description: Partial update of an alert.
      properties:
        condition: { $ref: '#/components/schemas/AlertCondition' }
        threshold: { type: number, nullable: true }
        notification: { type: string, enum: [email, sms] }
        parameters: { type: object, nullable: true, additionalProperties: true }
    AlertHistory:
      type: object
      properties:
        alert_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid, nullable: true }
        email: { type: string, nullable: true }
        symbol: { type: string }
        action_type: { type: string, enum: [created, deleted, triggered, paused, reactivated, verified, notification_sent, notification_failed] }
        action_timestamp: { type: string, format: date-time }
        previous_status:
          type: string
          allOf:
            - $ref: '#/components/schemas/AlertStatus'
          nullable: true
        new_status:
          type: string
          oneOf:
            - $ref: '#/components/schemas/AlertStatus'
            - type: string
              enum: [deleted]
          nullable: true
        alert_data: { type: object, additionalProperties: true }
        trigger_price: { type: number, nullable: true }
        notification_status: { type: string, nullable: true }
    AlertHistoryCreateRequest:
      type: object
      required: [alert_id, symbol, action_type, alert_data]
      properties:
