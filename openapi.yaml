openapi: 3.0.3
info:
  title: StockAlert.pro API
  version: 1.1.0
  contact:
    name: StockAlert.pro Support
    email: support@stockalert.pro
    url: https://stockalert.pro/imprint
  license:
    name: Proprietary
    url: https://stockalert.pro/terms
  termsOfService: https://stockalert.pro/terms
  description: |
    Unified v1 API for alerts, watchlists, stocks, webhooks and API keys.

    Authentication: API Key (`X-API-Key`), Bearer JWT (`Authorization: Bearer <token>`) or Session (first‑party web).

externalDocs:
  description: Complete API documentation and guides
  url: https://docs.stockalert.pro/api
servers:
  - url: https://stockalert.pro
    description: Production
tags:
  - name: Alerts
    description: Manage price and technical alerts
  - name: Watchlist
    description: Manage your watchlist items and AI analysis
  - name: Webhooks
    description: Manage outgoing webhooks for alert events
  - name: API Keys
    description: Manage API keys for programmatic access
  - name: Stocks
    description: Stocks catalog and details
  - name: Market
    description: Internal market insights endpoints
  - name: Feedback
    description: Collect and manage user feedback (internal)
  - name: User
    description: Account, session and preferences (internal)
  - name: Auth
    description: Authentication and session management
  - name: Utilities
    description: Shared utility endpoints (redirects)
  - name: Cron
    description: Internal scheduled jobs (Vercel Cron)

paths:
  /api/v1/redirect:
    get:
      x-internal: true
      tags: [Utilities]
      operationId: redirect
      summary: Redirect to an external URL
      description: Wraps outbound links (e.g., email/news) with the StockAlert.pro domain.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: u
          in: query
          required: true
          description: Absolute URL to redirect to (http/https only)
          schema:
            type: string
            format: uri
        - name: source
          in: query
          required: false
          description: Optional source label for attribution (e.g., `email_news`)
          schema: { type: string }
        - name: symbol
          in: query
          required: false
          description: Stock symbol for tracking
          schema: { type: string }
        - name: uid
          in: query
          required: false
          description: User id for tracking
          schema: { type: string }
        - name: tid
          in: query
          required: false
          description: Trigger id for tracking
          schema: { type: string }
      responses:
        '302':
          description: Redirect to the provided URL
          headers:
            Location:
              description: Target URL
              schema: { type: string, format: uri }
        '400':
          description: Invalid or missing `u` parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
              example:
                error: invalid_url

  /api/v1/stocks:
    get:
      tags: [Stocks]
      x-internal: true
      operationId: stocksList
      summary: List stocks
      description: Paginated list of stocks with optional search and filters.
      # Internal: guest allowed for first‑party only; API key not supported
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/LimitAlertsList'
        - name: active
          in: query
          schema: { type: boolean }
        - name: fields
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: false
          description: "CSV projection: `details` (include stock_details), `fundamentals` (include stock_fundamentals)"
        - name: include_inactive
          in: query
          schema: { type: boolean }
          description: Include inactive stocks if `true` (default returns only active)
      responses:
        '200':
          description: Successful response
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiSuccessStocksListEnvelope'
                  - $ref: '#/components/schemas/ApiSuccessStocksSearchEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [Stocks]
      x-internal: true
      operationId: stocksUpsert
      summary: Upsert stock
      description: |
        Ensures a stock exists (create if missing). May enqueue background jobs.
      x-required-scopes: [stocks:write]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol]
              properties:
                symbol: { type: string }
                name: { type: string }
                type: { type: string }
                exchange: { type: string }
                activate: { type: boolean }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '200': { $ref: '#/components/responses/Ok' }
        '202':
          description: Accepted; background jobs enqueued
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      symbol: { type: string }
                      created: { type: boolean }
                      jobs_queued: { type: integer }
                  meta:
                    type: object
                    properties:
                      rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Validation' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/stocks/{symbol}:
    get:
      tags: [Stocks]
      operationId: stocksGet
      summary: Get stock detail
      description: Returns a single stock with optional fundamentals.
      x-required-scopes: [stocks:read]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
        - name: fields
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: false
          description: "CSV projection: `fundamentals` (include stock_fundamentals)"
      responses:
        '200':
          description: Successful
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiSuccessStockEnvelope'
                  - $ref: '#/components/schemas/ApiSuccessStockWithFundamentalsEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Validation' }
        '429': { $ref: '#/components/responses/RateLimited' }
    patch:
      tags: [Stocks]
      x-internal: true
      operationId: stocksPatch
      summary: Update stock
      description: Update mutable fields like active state.
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Validation' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/stocks/{symbol}/earnings:
    get:
      tags: [Stocks]
      x-internal: true
      operationId: stocksEarnings
      summary: Get earnings timeline
      description: Returns upcoming and recent earnings information.
      # Internal: guest allowed for first‑party only; API key not supported
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Validation' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/stocks/{symbol}/analysis:
    get:
      tags: [Stocks]
      x-internal: true
      operationId: stocksAnalysis
      summary: AI stock analysis (internal)
      description: Server-sent events stream with AI-generated analysis and recommendations.
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
        - name: investment_horizon
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
          description: Optional horizon in days to tailor the analysis
      responses:
        '200':
          description: Streaming analysis events
          content:
            text/event-stream:
              schema:
                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /api/v1/quotes:
    get:
      tags: [Stocks]
      x-internal: true
      operationId: quotesBulk
      summary: Get bulk quotes
      description: Lightweight prices for multiple symbols.
      # Internal: guest allowed for first‑party only; API key not supported
      security:
        - BearerAuth: []
      parameters:
        - name: symbols
          in: query
          required: true
          schema:
            type: array
            items: { type: string }
          style: form
          explode: false
          description: CSV list of symbols (e.g., AAPL,MSFT)
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Validation' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/watchlist:
    get:
      tags: [Watchlist]
      operationId: watchlistList
      summary: List watchlist items
      description: Returns current user's watchlist items.
      x-required-scopes: [watchlist:read]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Successful response
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistListEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      - id: "00000000-0000-4000-8000-000000000001"
                        stock_symbol: "AAPL"
                        intention: "buy"
                        target_price: 200
                        initial_price: 189.2
                        auto_alerts_enabled: true
                        stocks:
                          symbol: "AAPL"
                          name: "Apple Inc."
                          last_price: 189.2
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [Watchlist]
      operationId: watchlistCreate
      summary: Add item to watchlist
      description: Creates a new watchlist item.
      x-required-scopes: [watchlist:write]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWatchlistItemRequest' }
      responses:
        '201':
          description: Created
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistItemEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      id: "00000000-0000-4000-8000-000000000002"
                      stock_symbol: "MSFT"
                      intention: "sell"
                      initial_price: 300
                      auto_alerts_enabled: false
                      stocks:
                        symbol: "MSFT"
                        name: "Microsoft Corp."
                        last_price: 300.1
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/watchlist/{id}:
    patch:
      tags: [Watchlist]
      operationId: watchlistUpdate
      summary: Update watchlist item
      description: Update fields of an existing watchlist item.
      x-required-scopes: [watchlist:write]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateWatchlistItemRequest' }
      responses:
        '200':
          description: Updated
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistItemEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      id: "00000000-0000-4000-8000-000000000002"
                      stock_symbol: "MSFT"
                      intention: "sell"
                      target_price: 305
                      initial_price: 300
                      auto_alerts_enabled: false
                      stocks:
                        symbol: "MSFT"
                        name: "Microsoft Corp."
                        last_price: 301.5
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
    delete:
      tags: [Watchlist]
      operationId: watchlistDelete
      summary: Delete watchlist item
      description: Delete an item from the watchlist.
      x-required-scopes: [watchlist:write]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistDeletedEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      deleted: true
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/watchlist/order:
    put:
      tags: [Watchlist]
      operationId: watchlistSwapIntention
      summary: Swap intention (buy/sell) and reanalyze
      description: Resets initial price and queues analysis for intention change.
      x-required-scopes: [watchlist:write]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SwapIntentionRequest' }
      responses:
        '200':
          description: Updated
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistOrderEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      item:
                        id: "00000000-0000-4000-8000-000000000003"
                        stock_symbol: "AAPL"
                        intention: "buy"
                        initial_price: 189.2
                        auto_alerts_enabled: true
                        stocks:
                          symbol: "AAPL"
                          name: "Apple Inc."
                          last_price: 190.0
                      deleted_alerts: 2
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/watchlist/paper-trades:
    get:
      tags: [Watchlist]
      operationId: watchlistPaperTrades
      summary: List watchlist paper trades
      description: Returns simulated paper trades for the current user.
      x-required-scopes: [watchlist:read]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Successful response
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistPaperTradesEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      - id: "00000000-0000-4000-8000-000000000010"
                        user_id: "00000000-0000-4000-8000-000000000001"
                        watchlist_id: "00000000-0000-4000-8000-000000000002"
                        watchlist_item_id: "00000000-0000-4000-8000-000000000003"
                        symbol: "NVDA"
                        direction: "long"
                        notional_usd: 1000
                        quantity: 2.5
                        entry_price: 400
                        entry_at: "2024-10-01T14:35:00Z"
                        status: "open"
                        exit_price: null
                        exit_at: null
                        realized_pnl_usd: null
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/watchlist/performance:
    get:
      tags: [Watchlist]
      operationId: watchlistPerformance
      summary: Watchlist paper portfolio performance vs. S&P 500
      description: >
        Returns the simulated paper portfolio performance for the current user,
        compared against an S&P 500 benchmark, normalized to 100 at the first
        available day in the selected range.
      x-required-scopes: [watchlist:read]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: [3m,6m,1y,max]
          required: false
          description: >
            Time range for the performance series.
            Defaults to `max` (from first paper trade until today).
      responses:
        '200':
          description: Successful response
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessWatchlistPerformanceEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      range: "1y"
                      base_date: "2024-01-01"
                      series:
                        watchlist:
                          - { date: "2024-01-01", value: 100.0 }
                          - { date: "2024-02-01", value: 105.3 }
                          - { date: "2024-03-01", value: 98.7 }
                        sp_500:
                          - { date: "2024-01-01", value: 100.0 }
                          - { date: "2024-02-01", value: 101.2 }
                          - { date: "2024-03-01", value: 103.0 }
                      summary:
                        watchlist_return_pct: 5.3
                        sp500_return_pct: 3.0
                        alpha_pct: 2.3
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/api-keys:
    get:
      tags: [API Keys]
      x-internal: true
      operationId: apiKeysList
      summary: List API keys
      description: Returns API keys for the authenticated user (prefix only).
      x-required-scopes: [api-keys:read]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successful response
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessApiKeysListEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      - id: "a1111111-2222-3333-4444-555555555555"
                        name: "CI Token"
                        key_prefix: "sk_12ab3c4"
                        rate_limit_tier: "basic"
                        is_active: true
                        created_at: "2025-01-01T12:00:00.000Z"
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [API Keys]
      x-internal: true
      operationId: apiKeysCreate
      summary: Create API key
      description: |
        Creates a new API key. The plaintext key is returned only once.
        - Basic accounts can create 1 active API key.
        - Premium and Early Bird accounts can create unlimited API keys.
      x-required-scopes: [api-keys:write]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Created
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessApiKeyEnvelope'
              examples:
                example:
                  value:
                    success: true
                    data:
                      id: "b2222222-3333-4444-5555-666666666666"
                      name: "My Integration"
                      key_prefix: "sk_ab12cd3"
                      created_at: "2025-01-01T12:00:00.000Z"
                      rate_limit_tier: "premium"
                      api_key: "sk_abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"
                    meta:
                      rate_limit: { limit: 200, remaining: 199, reset: 1736180400000 }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
