  # User (internal)
  /api/v1/user/session:
    get:
      tags: [User]
      x-internal: true
      operationId: userSession
      summary: Get current session (internal)
      description: Returns a snapshot of the current authenticated user including metadata and identities.
      security:
        - BearerAuth: []
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
    patch:
      tags: [User]
      x-internal: true
      operationId: updateUserSession
      summary: Update user metadata (internal)
      description: |
        Updates user metadata. Commonly used for storing user preferences like notification read timestamps.
        Provided metadata fields update the corresponding fields in user_metadata, while fields not included in the request remain unchanged.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_metadata]
              properties:
                user_metadata:
                  type: object
                  description: User metadata fields to update. Fields not included remain unchanged.
                  properties:
                    last_notification_read_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: ISO 8601 timestamp of when the user last read their notifications
                      example: "2025-11-03T14:30:00.000Z"
                    dashboard_theme_preference:
                      type: string
                      enum: [light, dark, system]
                      description: User's preferred dashboard theme
                  additionalProperties: true
            examples:
              notification_timestamp:
                summary: Update notification read timestamp
                value:
                  user_metadata:
                    last_notification_read_at: "2025-11-03T14:30:00.000Z"
              theme_preference:
                summary: Update theme preference
                value:
                  user_metadata:
                    dashboard_theme_preference: "dark"
      responses:
        '200':
          description: User metadata updated successfully
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user_metadata:
                        type: object
                        description: Complete merged user metadata
                        additionalProperties: true
                  meta:
                    type: object
                    properties:
                      rate_limit:
                        $ref: '#/components/schemas/MetaRateLimit'
              examples:
                success:
                  value:
                    success: true
                    data:
                      user_metadata:
                        dashboard_theme_preference: "dark"
                        last_notification_read_at: "2025-11-03T14:30:00.000Z"
                        existing_field: "preserved_value"
                    meta:
                      rate_limit:
                        limit: 30
                        remaining: 29
                        reset: 1736180400000
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

