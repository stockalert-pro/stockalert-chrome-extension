  /api/v1/auth/oauth/{provider}:
    get:
      tags: [Auth]
      x-internal: true
      operationId: authOauthStart
      summary: Start OAuth login flow (redirect)
      description: |
        Starts an OAuth login flow and redirects the client to the provider's authorization URL.
        Use `redirect_to` to control the callback destination.
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github, apple, azure]
          description: OAuth provider to use
        - name: redirect_to
          in: query
          required: false
          schema: { type: string }
          description: Absolute URL to redirect back after auth
      responses:
        '302':
          description: Redirect to provider authorization URL
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
    post:
      tags: [Auth]
      x-internal: true
      operationId: authOauthStartWithOnboarding
      summary: Start OAuth login flow (JSON) + stash onboarding alert
      description: |
        Starts an OAuth login flow and returns the provider authorization URL in JSON. Optionally stashes an onboarding alert payload
        in a short-lived HTTP-only cookie to be processed after authentication in `/callback`.
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github, apple, azure]
          description: OAuth provider to use
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                redirect_to:
                  type: string
                  description: Absolute URL to redirect back after auth (defaults to `/callback`).
                onboarding_alert:
                  type: object
                  description: Optional onboarding alert to stash server-side.
                  properties:
                    stock:
                      type: object
                      properties:
                        symbol: { type: string }
                        name: { type: string }
                        price: { type: number, nullable: true }
                    alert:
                      type: object
                      properties:
                        condition_id: { type: string }
                        value: { type: number, nullable: true }
                        parameters: { type: object, additionalProperties: true }
                    created_at: { type: string, format: date-time }
                    onboarding_id: { type: string }
      responses:
        '200':
          description: Provider authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      url: { type: string }
              examples:
                example:
                  value:
                    success: true
                    data:
                      url: "https://accounts.google.com/o/oauth2/v2/auth?..."
        '400':
          description: Bad request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
              examples:
                unsupported_provider:
                  value:
                    success: false
                    error: { code: BAD_REQUEST, message: Unsupported provider }
                invalid_redirect:
                  value:
                    success: false
                    error: { code: BAD_REQUEST, message: invalid redirect_to url }
        '429':
          description: Rate limit exceeded
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/X-RateLimit-Limit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/X-RateLimit-Remaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/X-RateLimit-Reset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
              examples:
                throttled:
                  value:
                    success: false
                    error: { code: RATE_LIMITED, message: Too many requests }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiErrorEnvelope' }
              examples:
                oauth_failed:
                  value:
                    success: false
                    error: { code: INTERNAL_ERROR, message: OAuth initialization failed }

