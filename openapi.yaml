          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccessAuthLoginEnvelope' }
              examples:
                password_success:
                  value:
                    success: true
                    data: { user: { id: "00000000-0000-4000-8000-000000000000", email: "john@example.com" } }
                    meta:
                      rate_limit: { limit: 10, remaining: 9, reset: 1736180400000 }
                magic_link_sent:
