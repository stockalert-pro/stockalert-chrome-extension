    # User domain
    UserSubscription:
      type: object
      properties:
        id: { type: string, nullable: true }
        account_type: { type: string, enum: [basic, premium, early_bird] }
        status: { type: string }
        is_early_bird: { type: boolean }
        is_early_bird_eligible: { type: boolean }
        is_premium: { type: boolean }
        cancel_at_period_end: { type: boolean, nullable: true }
        quotas:
          type: object
          properties:
            sms: { type: integer }
        usage:
          type: object
          properties:
            count: { type: integer }
        current_period:
          type: object
          properties:
            start: { type: string, format: date-time, nullable: true }
            end: { type: string, format: date-time, nullable: true }
        alerts:
          type: object
          description: Aggregated alert information for the current user
          properties:
            counts:
              type: object
              properties:
                total: { type: integer, description: Total alerts across all statuses }
                by_status:
                  type: object
                  additionalProperties: { type: integer }
                  description: Alert counts grouped by status (e.g., active, paused, triggered, inactive)
            quota:
              type: object
              properties:
                limit: { type: integer, nullable: true, description: Maximum active alerts allowed; null for unlimited }
                remaining: { type: integer, nullable: true, description: Remaining active alerts quota; null when unlimited }
                unlimited: { type: boolean, description: Whether the alert quota is unlimited }
        # Deprecated alert_* fields removed; use alerts.counts and alerts.quota
        watchlist_items_count: { type: integer }
        watchlist_quota: { type: integer }

    ApiSuccessUserSubscriptionEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/UserSubscription' }
        meta:
          type: object
          properties:
            rate_limit: { $ref: '#/components/schemas/MetaRateLimit' }

    
